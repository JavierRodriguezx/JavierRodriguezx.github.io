<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=, maximum-scale=1">
    <title>Mi pagina web</title>
    <link rel="stylesheet" href="normalize.css">
    <link rel="stylesheet" href="variables.css">
    <link rel="stylesheet" href="scroll.css">
    <link rel="stylesheet" href="styles.css">
    <script src="https://kit.fontawesome.com/9c2f7fdcfc.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="responsive.css">
    <script src="map.js" defer></script>
    <script src="menu.js" defer></script>
</head>
<body>
    <!--Layout Principal-->
    <div class="layout">
        <!--Barra lateral (info usuario)-->
        <aside class="layout__aside">
            <section class="aside__user-info">
                <!--Informacion general usuario-->
                <div class="user-info__general">
                    <div class="user-info__container-image">
                        <img src="img/imgcarlos.jpg" alt="tabla" width="200px" height="200px">
                    </div>
                    <h2 class="user-info__name">Javier Rodriguez</h2>
                    <h4 class="user-info__job">Desarrollador Web</h4>

                </div>
                <!--Menu de navegacion-->
                <nav class="layout__menu">
                    <ul class="menu__list">
                        <li class="menu__option">
                            <a href="index.html" class="menu__link">
                                <i class="menu__icon fa-solid fa-house"></i>
                                <span class="menu__overlay">Home</span
                            </a>
                        </li>
                        <li class="menu__option">
                            <a href="sobre-mi.html" class="menu__link">
                                <i class="menu__icon fa-solid fa-user"></i>
                                <span class="menu__overlay">sobre mi</span>

                            </a>
                        </li>
                        <li class="menu__option">
                            <a href="curriculum.html" class="menu__link">
                                <i class="menu__icon fa-solid fa-graduation-cap"></i>
                                <span class="menu__overlay">curriculum</span>

                            </a>
                        </li>
                        <li class="menu__option">
                            <a href="portafolio.html" class="menu__link">
                                <i class="menu__icon fa-solid fa-briefcase"></i>
                                <span class="menu__overlay">Portafolio</span>

                            </a>
                        </li>
                      
                        <li class="menu__option">
                            <a href="blog/inicio.html" class="menu__link">
                                <i class="menu__icon fa-solid fa-book"></i>
                                <span class="menu__overlay">Blog</span>

                            </a>
                        </li>
                        <li class="menu__option">
                            <a href="contacto.html" class="menu__link">
                                <i class="menu__icon fa-solid fa-envelope"></i>
                                <span class="menu__overlay">contacto</span>

                            </a>
                        </li>
                    </ul>
                </nav>
                <!--Links a redes sociales-->
                <div class="user-info__links">
                    <ul class="user-links__social">
                        <li class="social__option">
                            <a href="#" class="social__link">
                                <i class="social__icon fa-brands fa-youtube"></i>
                            </a>
                        </li>
                        <li class="social__option">
                            <a href="#" class="social__link">
                                <i class="social__icon fa-brands fa-linkedin"></i>
                            </a>
                        </li>
                        <li class="social__option">
                            <a href="#" class="social__link">
                                <i class="social__icon fa-brands fa-instagram"></i>
                            </a>
                        </li>
                    </ul>
                </div>
                <!--Boton del curriculum-->
                <div class="user-info__buttons">
                    <a href="#" class="user-info__btn">Descargar CV</a>

                </div>
                <!--pie de pagina-->
                <footer class="user-info__fooster">&copy; 2023 Javier Rodriguez</footer>
            </section>
        </aside>
        <!--Menu responsive-->
        <div class="layout__menu-toggle">
            
            <i class="menu-toggle_icon fa-solid fa-bars"></i>
            <i class="menu-toggle_icon fa-solid fa-xmark"></i>
        </div>


        <!--Esto Se modifica-->
        <!--Contenido principal-->
        <main class="layout__content">
            <section class="content__page content__contact">

                <header class="contact__header">
                    <h2 class="contact__title">Contacto</h2>
                </header>

                <!--Contacto-->

                <div class="contact__container">

                    <section class="contact__info">

                        <div class="contact__data">
                            <i class="contact__icon fa-solid fa-location-dot"></i>
                            <h2 class="contact__subtitle">Veracruz</h2>
                        </div>
                        <div class="contact__data">
                            <i class="contact__icon fa-solid fa-phone"></i>
                            <h2 class="contact__subtitle">782983982</h2>
                        </div>
                        <div class="contact__data">
                            <i class="contact__icon fa-solid fa-envelope"></i>
                            <h2 class="contact__subtitle">carlos.rodr95@outlook.com</h2>
                        </div>
                        <div class="contact__data">
                            <i class="contact__icon fa-solid fa-circle-check"></i>
                            <h2 class="contact__subtitle">Ing. en sistemas Computacionales</h2>
                        </div>
                       
                       
                    </section>

                    
                    <section class="contact__form-box">
                        <div class="contact__map" id="load-iframe-map">
                            <span class="loader"></span>
                           

                        </div>
                        <header class="contact__form-header">
                            <h3 class="form-header__title">Como puedo <span class="title__color">Ayudarte</span></h3>
                        </header>

                        <form class="contact__form">

                            <div class="form__container">

                                <section class="form__left">

                                    <div class="form__group">
                                        <input type="text" class="form__input" name="name" required placeholder="name">
                                        <label for="name" class="form__label">Nombre</label>
                                    </div>
                                    
                                    <div class="form__group">
                                        <input type="email" class="form__input" name="email" required placeholder="email">
                                        <label for="email" class="form__label">Email</label>
                                    </div>
                                    
                                    <div class="form__group">
                                        <input type="text" class="form__input" name="subject" required placeholder="subject">
                                        <label for="name" class="form__label">Asunto</label>
                                    </div>

                                </section>
                                
                                    <section class="form__rigth">
                                        <div  class="form__group">
                                            <textarea class="form__input form__input--textarea" name="message" requiered placeholder="mensaje"></textarea>
                                            <label for="message" class="form__label">Mensaje</label>
                                        </div>
                                    
                                    </section>

                            </div>
                            <input type="submit" class="form__button" value="enviar mensaje">
                        </form>

                    </section>
                </div>

               










            </section>



        </main>
    </div>
</body>
</html>
